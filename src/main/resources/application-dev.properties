# =============================================
# PERFIL LOCAL DE DESARROLLO — NO USAR EN PROD
# =============================================

# H2 In-Memory Database (no afecta Supabase)
spring.datasource.url=jdbc:h2:mem:ganjahdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — recrear tablas en cada arranque
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console habilitada para inspeccionar datos en localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Puerto local
server.port=8080
