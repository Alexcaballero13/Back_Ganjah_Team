name: Keep Supabase Alive

on:
  schedule:
    # Se ejecuta todos los miércoles a las 12:00 UTC
    - cron: '0 12 * * 3'
  workflow_dispatch: # Permite probarlo manualmente cuando quieras

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
